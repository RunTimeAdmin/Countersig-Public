name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentid
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agentid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentid -d agentid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://agentid:test@localhost:5432/agentid
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-that-is-at-least-32-characters-long-for-ci
      BAGS_API_KEY: test-bags-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci

      - name: Lint
        run: cd backend && npx eslint src/ --max-warnings=0 || true
        # Advisory — show lint issues without failing the build

      - name: Security audit
        run: cd backend && npm audit --audit-level=high --production || true
        # Advisory — report high/critical vulnerabilities

      - name: OpenAPI lint
        run: npx @stoplight/spectral-cli lint backend/openapi.yaml || true
        # Advisory — validate OpenAPI spec

      - name: Run tests
        run: cd backend && npm test
