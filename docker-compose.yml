# For production, set all secrets via environment variables or .env file
# AgentID 2.0 — Docker Compose for local development
# Production URL: https://agentid2.provenanceai.network
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentid-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: agentid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentid -d agentid"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - agentid-network

  redis:
    image: redis:7-alpine
    container_name: agentid-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - agentid-network

  backend:
    image: node:20-alpine
    container_name: agentid-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentid}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/agentid
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      CORS_ORIGIN: https://agentidapp.com
      AGENTID_BASE_URL: https://api.agentidapp.com
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentid-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_node_modules:
    driver: local

networks:
  agentid-network:
    driver: bridge
