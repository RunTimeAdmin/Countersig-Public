openapi: "3.0.3"
info:
  title: AgentID 2.0 API
  version: "2.0.0"
  description: |
    AgentID 2.0 — Universal Non-Human Identity (NHI) platform.
    Provides agent registration, reputation scoring, W3C DID/VC credential export,
    A2A authentication tokens, organization management, policy enforcement,
    webhook integrations, and embeddable trust badges/widgets.

    All routes are available at both the root path and under the `/v1/` prefix.
    Root-mounted routes are deprecated; prefer `/v1/` for new integrations.
  contact:
    name: AgentID Team
    url: https://agentidapp.com
  license:
    name: MIT

servers:
  - url: https://api.agentidapp.com
    description: Production
  - url: https://api.agentidapp.com/v1
    description: Production (versioned)
  - url: http://localhost:3002
    description: Local development

tags:
  - name: Auth
    description: User authentication (login, register, token refresh)
  - name: Agents
    description: Agent CRUD, discovery, A2A tokens, and credentials
  - name: Registration
    description: Multi-step agent registration and verification
  - name: Attestations
    description: Agent attestations and flagging
  - name: Reputation
    description: Reputation scoring and breakdown
  - name: Webhooks
    description: Org webhook management
  - name: Badges
    description: Trust badge SVG and JSON endpoints
  - name: Widgets
    description: Embeddable trust widget
  - name: Organizations
    description: Organization management and compliance
  - name: Usage
    description: Usage metering and history
  - name: Credentials
    description: Verifiable Credential verification
  - name: Policies
    description: Organization policy CRUD
  - name: Audit
    description: Audit log access
  - name: Health
    description: Health checks, metrics, and discovery endpoints

security:
  - BearerAuth: []

paths:
  # ── Auth ──────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      operationId: authRegister
      summary: Register a new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  accessToken: { type: string }
                  refreshToken: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409":
          description: Email already registered

  /auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  accessToken: { type: string }
                  refreshToken: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: Logged out

  # ── Registration ──────────────────────────────────────
  /register:
    post:
      tags: [Registration]
      operationId: registerAgent
      summary: Register a new agent identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, publicKey, chainType]
              properties:
                name: { type: string }
                publicKey: { type: string }
                chainType: { type: string, enum: [solana, evm] }
                capabilities: { type: array, items: { type: string } }
                description: { type: string }
                url: { type: string, format: uri }
                metadata: { type: object }
      responses:
        "201":
          description: Agent registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400": { $ref: "#/components/responses/BadRequest" }

  /verify/challenge:
    post:
      tags: [Registration]
      operationId: getVerificationChallenge
      summary: Get a verification challenge for agent ownership proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId]
              properties:
                agentId: { type: string, format: uuid }
      responses:
        "200":
          description: Challenge issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge: { type: string }
                  expiresAt: { type: string, format: date-time }
        "404": { $ref: "#/components/responses/NotFound" }

  /verify/response:
    post:
      tags: [Registration]
      operationId: submitVerificationResponse
      summary: Submit signed challenge to prove agent ownership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId, signature]
              properties:
                agentId: { type: string, format: uuid }
                signature: { type: string }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ── Agents ────────────────────────────────────────────
  /chains:
    get:
      tags: [Agents]
      operationId: listChains
      summary: List supported blockchain chains
      security: []
      responses:
        "200":
          description: Supported chains
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    chainType: { type: string }
                    name: { type: string }

  /agents:
    get:
      tags: [Agents]
      operationId: listAgents
      summary: List agents for the authenticated user's org
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents: { type: array, items: { $ref: "#/components/schemas/Agent" } }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /public/agents:
    get:
      tags: [Agents]
      operationId: listPublicAgents
      summary: Public agent registry listing
      security: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: chain
          in: query
          schema: { type: string }
        - name: capability
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Public agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents: { type: array, items: { $ref: "#/components/schemas/Agent" } }
                  total: { type: integer }

  /agents/owner/{pubkey}:
    get:
      tags: [Agents]
      operationId: getAgentsByOwner
      summary: Get agents by owner public key
      security: []
      parameters:
        - name: pubkey
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Agents for owner
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Agent" }

  /agents/{agentId}:
    get:
      tags: [Agents]
      operationId: getAgent
      summary: Get agent detail with reputation data
      security: []
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404": { $ref: "#/components/responses/NotFound" }

  /agents/{agentId}/credential:
    get:
      tags: [Agents]
      operationId: getAgentCredential
      summary: Get W3C Verifiable Credential for an agent
      security: []
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: Verifiable Credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifiableCredential"
        "404": { $ref: "#/components/responses/NotFound" }

  /agents/{agentId}/issue-token:
    post:
      tags: [Agents]
      operationId: issueA2AToken
      summary: Issue an A2A authentication token for an agent
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: A2A token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expiresIn: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /verify-token:
    post:
      tags: [Agents]
      operationId: verifyA2AToken
      summary: Verify an A2A authentication token (public)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Token verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  agentId: { type: string }
                  claims: { type: object }

  /discover:
    get:
      tags: [Agents]
      operationId: discoverAgents
      summary: Discover agents by capability
      security: []
      parameters:
        - name: capability
          in: query
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Matching agents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Agent" }

  /orgs/{orgId}/agents:
    get:
      tags: [Agents]
      operationId: listOrgAgents
      summary: List agents belonging to an organization
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      responses:
        "200":
          description: Org agents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Agent" }

  /agents/{agentId}/update:
    put:
      tags: [Agents]
      operationId: updateAgent
      summary: Update an agent (requires write scope and signature)
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                capabilities: { type: array, items: { type: string } }
                url: { type: string, format: uri }
                metadata: { type: object }
                signature: { type: string }
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /agents/{agentId}/revoke:
    post:
      tags: [Agents]
      operationId: revokeAgent
      summary: Revoke an agent (requires write scope and signature)
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signature]
              properties:
                signature: { type: string }
      responses:
        "200":
          description: Agent revoked
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ── Heartbeat ─────────────────────────────────────────
  /agents/{agentId}/heartbeat:
    post:
      tags: [Health]
      operationId: agentHeartbeat
      summary: Send agent heartbeat to indicate liveness (F-05)
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [healthy, degraded] }
                metadata: { type: object }
      responses:
        "200":
          description: Heartbeat recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  healthStatus: { type: string }
                  lastHeartbeat: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Attestations ──────────────────────────────────────
  /agents/{agentId}/attest:
    post:
      tags: [Attestations]
      operationId: attestAgent
      summary: Record an attestation for an agent
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, value]
              properties:
                type: { type: string }
                value: { type: number, minimum: 0, maximum: 5 }
                comment: { type: string }
      responses:
        "201":
          description: Attestation recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attestation"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /agents/{agentId}/flag:
    post:
      tags: [Attestations]
      operationId: flagAgent
      summary: Flag an agent for review
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
                details: { type: string }
      responses:
        "201":
          description: Flag recorded
        "401": { $ref: "#/components/responses/Unauthorized" }

  /agents/{agentId}/attestations:
    get:
      tags: [Attestations]
      operationId: getAttestations
      summary: Get attestation stats for an agent
      security: []
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: Attestation statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  average: { type: number }
                  attestations: { type: array, items: { $ref: "#/components/schemas/Attestation" } }

  /agents/{agentId}/flags:
    get:
      tags: [Attestations]
      operationId: getFlags
      summary: Get flags for an agent
      security: []
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: Agent flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  flags: { type: array, items: { type: object } }

  # ── Reputation ────────────────────────────────────────
  /reputation/{agentId}:
    get:
      tags: [Reputation]
      operationId: getReputation
      summary: Full reputation breakdown for an agent
      security: []
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: Reputation breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReputationBreakdown"
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Badges ────────────────────────────────────────────
  /badge/{agentId}:
    get:
      tags: [Badges]
      operationId: getBadgeSvg
      summary: Get trust badge as SVG image
      security: []
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: SVG badge
          content:
            image/svg+xml:
              schema: { type: string }

  /badge/{agentId}/json:
    get:
      tags: [Badges]
      operationId: getBadgeJson
      summary: Get trust badge data as JSON
      security: []
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: Badge JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  agentId: { type: string }
                  name: { type: string }
                  score: { type: number }
                  verified: { type: boolean }
                  chainType: { type: string }

  # ── Widgets ───────────────────────────────────────────
  /widget/{agentId}:
    get:
      tags: [Widgets]
      operationId: getWidget
      summary: Embeddable trust widget HTML
      security: []
      parameters:
        - $ref: "#/components/parameters/AgentIdParam"
      responses:
        "200":
          description: Widget HTML
          content:
            text/html:
              schema: { type: string }

  # ── Organizations ─────────────────────────────────────
  /orgs:
    post:
      tags: [Organizations]
      operationId: createOrg
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                plan: { type: string, enum: [free, pro, enterprise] }
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /orgs/{orgId}:
    get:
      tags: [Organizations]
      operationId: getOrg
      summary: Get organization details
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Organizations]
      operationId: updateOrg
      summary: Update organization details
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    delete:
      tags: [Organizations]
      operationId: deleteOrg
      summary: Delete an organization
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      responses:
        "200":
          description: Organization deleted

  /orgs/{orgId}/stats:
    get:
      tags: [Organizations]
      operationId: getOrgStats
      summary: Get organization statistics
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      responses:
        "200":
          description: Org statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  agentCount: { type: integer }
                  activeAgents: { type: integer }
                  totalAttestations: { type: integer }
                  averageReputation: { type: number }

  /orgs/{orgId}/compliance:
    put:
      tags: [Organizations]
      operationId: updateCompliance
      summary: Update compliance settings for an organization
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dataResidency: { type: string }
                retentionDays: { type: integer }
                encryptionRequired: { type: boolean }
      responses:
        "200":
          description: Compliance settings updated

  # ── Webhooks ──────────────────────────────────────────
  /orgs/{orgId}/webhooks:
    get:
      tags: [Webhooks]
      operationId: listWebhooks
      summary: List webhooks for an organization
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Webhook" }
    post:
      tags: [Webhooks]
      operationId: createWebhook
      summary: Create a webhook
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url: { type: string, format: uri }
                events: { type: array, items: { type: string } }
                secret: { type: string }
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /orgs/{orgId}/webhooks/{webhookId}:
    put:
      tags: [Webhooks]
      operationId: updateWebhook
      summary: Update a webhook
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
        - $ref: "#/components/parameters/WebhookIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, format: uri }
                events: { type: array, items: { type: string } }
                active: { type: boolean }
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    delete:
      tags: [Webhooks]
      operationId: deleteWebhook
      summary: Delete a webhook
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
        - $ref: "#/components/parameters/WebhookIdParam"
      responses:
        "200":
          description: Webhook deleted

  # ── Policies ──────────────────────────────────────────
  /orgs/{orgId}/policies:
    get:
      tags: [Policies]
      operationId: listPolicies
      summary: List policies for an organization
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      responses:
        "200":
          description: Policy list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Policy" }
    post:
      tags: [Policies]
      operationId: createPolicy
      summary: Create a new policy
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, rules]
              properties:
                name: { type: string }
                description: { type: string }
                rules: { type: object }
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"

  /orgs/{orgId}/policies/{policyId}:
    put:
      tags: [Policies]
      operationId: updatePolicy
      summary: Update a policy
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
        - $ref: "#/components/parameters/PolicyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                rules: { type: object }
                active: { type: boolean }
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
    delete:
      tags: [Policies]
      operationId: deletePolicy
      summary: Delete a policy
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
        - $ref: "#/components/parameters/PolicyIdParam"
      responses:
        "200":
          description: Policy deleted

  # ── Usage ─────────────────────────────────────────────
  /orgs/{orgId}/usage:
    get:
      tags: [Usage]
      operationId: getCurrentUsage
      summary: Get current usage metrics for an organization (F-01)
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
      responses:
        "200":
          description: Current usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageReport"

  /orgs/{orgId}/usage/history:
    get:
      tags: [Usage]
      operationId: getUsageHistory
      summary: Get usage history for an organization (F-01)
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
        - name: days
          in: query
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: Usage history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UsageReport" }

  # ── Credentials ───────────────────────────────────────
  /credentials/verify:
    post:
      tags: [Credentials]
      operationId: verifyCredential
      summary: Verify a W3C Verifiable Credential (F-02)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential: { $ref: "#/components/schemas/VerifiableCredential" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  checks: { type: array, items: { type: string } }
                  errors: { type: array, items: { type: string } }

  # ── Audit ─────────────────────────────────────────────
  /orgs/{orgId}/audit:
    get:
      tags: [Audit]
      operationId: getAuditLog
      summary: Get audit log for an organization
      parameters:
        - $ref: "#/components/parameters/OrgIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: action
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        action: { type: string }
                        userId: { type: string }
                        resource: { type: string }
                        timestamp: { type: string, format: date-time }
                        details: { type: object }
                  total: { type: integer }

  # ── Health & Discovery ────────────────────────────────
  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Health check
      security: []
      parameters:
        - name: x-health-detail
          in: header
          description: Secret for detailed health info
          schema: { type: string }
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  uptime: { type: number }
                  timestamp: { type: string, format: date-time }
                  version: { type: string }
                  postgres: { type: string }
                  redis: { type: string }

  /metrics:
    get:
      tags: [Health]
      operationId: getMetrics
      summary: Prometheus metrics (F-08)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema: { type: string }
        "403": { $ref: "#/components/responses/Forbidden" }

  /.well-known/jwks.json:
    get:
      tags: [Health]
      operationId: getJWKS
      summary: JWKS endpoint for A2A token Ed25519 public key
      security: []
      responses:
        "200":
          description: JWKS key set
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys: { type: array, items: { type: object } }

  /.well-known/did.json:
    get:
      tags: [Health]
      operationId: getDIDDocument
      summary: W3C DID document for did:web
      security: []
      responses:
        "200":
          description: DID document
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@context": { type: array, items: { type: string } }
                  id: { type: string }
                  verificationMethod: { type: array, items: { type: object } }
                  authentication: { type: array, items: { type: string } }
                  service: { type: array, items: { type: object } }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    AgentIdParam:
      name: agentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrgIdParam:
      name: orgId
      in: path
      required: true
      schema: { type: string, format: uuid }
    WebhookIdParam:
      name: webhookId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PolicyIdParam:
      name: policyId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }

  schemas:
    Agent:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        publicKey: { type: string }
        chainType: { type: string }
        capabilities: { type: array, items: { type: string } }
        description: { type: string }
        url: { type: string, format: uri }
        verified: { type: boolean }
        healthStatus: { type: string, enum: [healthy, stale, offline, unknown] }
        lastHeartbeat: { type: string, format: date-time }
        reputationScore: { type: number }
        orgId: { type: string, format: uuid }
        metadata: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        plan: { type: string, enum: [free, pro, enterprise] }
        ownerId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        orgId: { type: string, format: uuid }
        role: { type: string }
        createdAt: { type: string, format: date-time }

    Webhook:
      type: object
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        url: { type: string, format: uri }
        events: { type: array, items: { type: string } }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }

    Attestation:
      type: object
      properties:
        id: { type: string, format: uuid }
        agentId: { type: string, format: uuid }
        attesterId: { type: string }
        type: { type: string }
        value: { type: number }
        comment: { type: string }
        createdAt: { type: string, format: date-time }

    ReputationBreakdown:
      type: object
      properties:
        agentId: { type: string, format: uuid }
        overallScore: { type: number }
        onChainScore: { type: number }
        attestationScore: { type: number }
        verificationScore: { type: number }
        trustScore: { type: number }
        components:
          type: object
          properties:
            onChain: { type: object }
            attestations: { type: object }
            verification: { type: object }
            trust: { type: object }

    VerifiableCredential:
      type: object
      properties:
        "@context": { type: array, items: { type: string } }
        type: { type: array, items: { type: string } }
        issuer: { type: string }
        issuanceDate: { type: string, format: date-time }
        credentialSubject:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            reputationScore: { type: number }
        proof:
          type: object
          properties:
            type: { type: string }
            created: { type: string, format: date-time }
            verificationMethod: { type: string }
            proofPurpose: { type: string }
            proofValue: { type: string }

    UsageReport:
      type: object
      properties:
        orgId: { type: string, format: uuid }
        period: { type: string }
        apiCalls: { type: integer }
        agentRegistrations: { type: integer }
        attestations: { type: integer }
        tokensIssued: { type: integer }
        planLimits:
          type: object
          properties:
            maxAgents: { type: integer }
            maxApiCalls: { type: integer }
            currentUsagePercent: { type: number }

    Policy:
      type: object
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        rules: { type: object }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }

    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
        details: { type: object }

  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Unauthorized — missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
